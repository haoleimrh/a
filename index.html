<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open ShareMe</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui;
background:#111827;
color:white;
}

button{
padding:16px 28px;
font-size:18px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
}

</style>

</head>
<body>

<button onclick="openShareMe()">Open ShareMe</button>

<script>

function openShareMe(){

// Best intent for Xiaomi ShareMe

location.href =
"intent://launch#Intent;" +
"scheme=miui;" +
"package=com.xiaomi.midrop;" +
"action=android.intent.action.MAIN;" +
"category=android.intent.category.LAUNCHER;" +
"end";

}

</script>

</body>
</html>
