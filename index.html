<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open ShareMe</title>

<style>
body{
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}
</style>

</head>
<body>

<button onclick="openShareMe()">Open ShareMe</button>

<script>

function openShareMe(){

location.href =
"intent:#Intent;" +
"action=android.intent.action.MAIN;" +
"category=android.intent.category.LAUNCHER;" +
"package=com.xiaomi.midrop;" +
"end";

}

</script>

</body>
</html>
